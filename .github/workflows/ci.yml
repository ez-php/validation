name: ez-php - CI

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      WWWGROUP: '1000'
      WWWUSER: '1000'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---------- PHP + Composer on host (avoids OOM inside Docker) ----------
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_mysql
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Composer install
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # ---------- Build Docker image ----------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/app/Dockerfile
          push: false
          tags: ez-php/app:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
          build-args: |
            WWWGROUP=${{ env.WWWGROUP }}
            WWWUSER=${{ env.WWWUSER }}

      # ---------- Prepare environment ----------
      - name: Create .env from example
        run: cp .env.example .env

      # ---------- Start containers ----------
      - name: Start Docker Compose
        run: docker compose up -d

      # ---------- PHP CS Fixer ----------
      - name: Run CS Fixer (check only)
        run: docker compose exec -T app vendor/bin/php-cs-fixer fix --dry-run --diff

      # ---------- PHPStan ----------
      - name: Run PHPStan
        run: docker compose exec -T app vendor/bin/phpstan analyse

      # ---------- PHPUnit ----------
      - name: Run tests
        run: docker compose exec -T app vendor/bin/phpunit

      # ---------- Stop containers ----------
      - name: Stop Docker Compose
        if: always()
        run: docker compose down

  tag:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "value=$(jq -r '.version // empty' composer.json)" >> "$GITHUB_OUTPUT"

      - name: Create tag if not exists
        if: steps.version.outputs.value != ''
        env:
          TAG: v${{ steps.version.outputs.value }}
        run: |
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Tagged $TAG"
          fi
